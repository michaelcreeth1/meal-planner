services:
  meal-planner:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-}
    container_name: meal-planner
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /data
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-http://ha.home.arpa}
      HOME_ASSISTANT_TODO_ENTITY_ID: ${HOME_ASSISTANT_TODO_ENTITY_ID:-todo.safeway_list}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
